name: digitaltwin
services:
  app:
    image: ghcr.io/rickarddahlstrand/digitaltwin:latest
    restart: unless-stopped
    volumes:
      - pocketbase_data:/pb_data
    networks:
      net:
        ipv4_address: 10.10.24.3
    depends_on:
      - tunnel
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  tunnel:
    image: cloudflare/cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      net:
        ipv4_address: 10.10.24.2

volumes:
  pocketbase_data:

networks:
  net:
    ipam:
      config:
        - subnet: 10.10.24.0/24
